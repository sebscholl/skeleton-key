name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to release (for example v0.1.0)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Validate
        run: bundle exec rake

      - name: Verify tag matches gem version
        run: |
          version="$(ruby -e 'require_relative "lib/skeleton_key/version"; print SkeletonKey::VERSION')"
          tag="${INPUT_TAG#v}"
          test "$tag" = "$version"
        env:
          INPUT_TAG: ${{ inputs.tag }}

      - name: Configure RubyGems trusted publishing credentials
        uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Build gem
        run: bundle exec rake build

      - name: Push gem to RubyGems
        run: gem push pkg/skeleton_key-*.gem
