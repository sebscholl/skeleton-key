name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Validate
        run: bundle exec rake

      - name: Verify tag matches gem version
        run: |
          version="$(ruby -e 'require_relative "lib/skeleton_key/version"; print SkeletonKey::VERSION')"
          tag="${GITHUB_REF_NAME#v}"
          test "$tag" = "$version"

      - name: Release to RubyGems
        uses: rubygems/release-gem@v1
