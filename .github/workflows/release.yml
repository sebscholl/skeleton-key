name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Validate
        run: bundle exec rake

      - name: Verify tag matches gem version
        run: |
          version="$(ruby -e 'require_relative "lib/skeleton_key/version"; print SkeletonKey::VERSION')"
          tag="${GITHUB_REF_NAME#v}"
          test "$tag" = "$version"

      - name: Verify RubyGems API key is configured
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: test -n "$GEM_HOST_API_KEY"

      - name: Build gem
        run: bundle exec rake build

      - name: Push to RubyGems
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: gem push pkg/skeleton_key-*.gem
